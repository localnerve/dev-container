name: Update Seccomp Profile

on:
  schedule:
    # Every Monday at 06:00 UTC (~1am EST / 2am EDT)
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Force regeneration even if upstream hasn't changed"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Download latest Docker default seccomp profile
        id: download
        run: |
          URL="https://raw.githubusercontent.com/moby/profiles/refs/heads/main/seccomp/default.json"
          TMPFILE=$(mktemp)
          curl -fsSL "$URL" -o "$TMPFILE"
          
          python3 -c "import json, sys; json.load(open('$TMPFILE'))" || {
            echo "::error::Downloaded file is not valid JSON"
            exit 1
          }
          
          echo "✓ Downloaded and validated upstream profile"
          echo "tmpfile=$TMPFILE" >> "$GITHUB_OUTPUT"

      - name: Check for upstream changes
        id: diff
        env:
          UPSTREAM_FILE: ${{ steps.download.outputs.tmpfile }}
          LOCAL_FILE: seccomp/docker-default.json
        run: |
          chmod +x scripts/check-seccomp-diff.sh
          ./scripts/check-seccomp-diff.sh "$UPSTREAM_FILE" "$LOCAL_FILE"

      - name: Update local copy and regenerate chrome.json
        if: steps.diff.outputs.changed == 'true' || github.event.inputs.force == 'true'
        run: |
          UPSTREAM="${{ steps.download.outputs.tmpfile }}"
          
          cp "$UPSTREAM" seccomp/docker-default.json
          
          chmod +x scripts/update-chrome-seccomp.sh
          ./scripts/update-chrome-seccomp.sh --input seccomp/docker-default.json --out chrome.json

      - name: Commit and push changes
        if: steps.diff.outputs.changed == 'true' || github.event.inputs.force == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add seccomp/docker-default.json chrome.json
          
          if ! git diff --cached --quiet; then
            git commit \
              -m "chore(seccomp): update Docker default profile and regenerate chrome.json" \
              -m "Upstream: moby/profiles main/seccomp/default.json" \
              -m "Triggered by scheduled weekly check (Monday)"
            
            git push origin HEAD
            echo "::notice::Pushed updated seccomp profiles to repository."
          else
            echo "::warning::No actual file changes detected — skipping commit."
          fi

      - name: Report status
        if: always()
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ] || [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "::notice::Seccomp profile update completed."
          else
            echo "::notice::No upstream changes detected. Profile is current."
          fi