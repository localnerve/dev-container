services:
  dev-workstation:
    build:
      context: .
      args:
        GCM_VERSION: "2.8.0"
        NODE_VERSIONS: "22 24"
        NODE_DEFAULT: "24"
        GO_VERSIONS: "1.25.5 1.26.0"
        GO_DEFAULT: "1.26.0"
    container_name: dev-env
    volumes:
      - /Users/agrant/projects:/workspace
      - ~/.gitconfig:/home/vscode/.gitconfig:ro
      - ~/.gitconfig.local:/home/vscode/.gitconfig.local:ro
      - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock
      - gcm-tokens:/home/vscode/.config/GitCredentialManager
    environment:
      - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
      - GCM_CREDENTIAL_STORE=plaintext
    tty: true
    stdin_open: true

volumes:
  gcm-tokens:
    name: gcm_cache