services:
  dev-workstation:
    build: .
    container_name: dev-env
    volumes:
      - /Users/agrant/projects:/workspace
      - nvm_data:/root/.nvm
      - goenv_data:/root/.goenv
      - ~/.gitconfig:/root/.gitconfig:ro
      # Standard way to forward SSH on Docker Desktop for Mac
      - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock
    environment:
      - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
    tty: true
    stdin_open: true

volumes:
  nvm_data:
  goenv_data:
